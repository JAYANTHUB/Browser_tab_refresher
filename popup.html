<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 10px;
      width: 200px;
    }

    input {
      width: 100%;
      padding: 6px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 8px;
      margin-top: 6px;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      font-weight: bold;
      color: white;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }

    #start {
      background-color: #2e7d32; /* Green */
    }

    #pause {
      background-color: #f9a825; /* Yellow */
      color: #000;
    }

    #resume {
      background-color: #1565c0; /* Blue */
    }

    #stop {
      background-color: #c62828; /* Red */
    }
  </style>
</head>

<body>
  <h3>Auto Refresh</h3>

  <label>Time (seconds)</label>
  <input type="number" id="time" min="1" value="5" />

  <button id="start">Start</button>
  <button id="pause">Pause</button>
  <button id="resume">Resume</button>
  <button id="stop">Stop</button>

  <script src="popup.js"></script>
</body>
</html>
